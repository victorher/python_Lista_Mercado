{% extends "base.html" %}

{% block title %}Ingresar - Mercado Inteligente{% endblock %}

{% block extra_css %}
<style>
    .login-container { max-width: 400px; margin: 40px auto; }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h2 class="text-center mb-4">🛒 Ingresar</h2>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" id="username" required autofocus>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" id="password" required>
                </div>
                <div class="mb-3 form-check d-flex justify-content-between">
                    <div>
                        <input type="checkbox" name="remember" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Recordarme</label>
                    </div>
                    <a href="{{ url_for('mercado.reset_request') }}" class="text-decoration-none small">¿Olvidaste tu contraseña?</a>
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
        <div class="card-footer text-muted text-center border-0 bg-transparent">
            <small>Usa <b>admin</b> / <b>admin123</b> para probar</small>
        </div>
    </div>
</div>
{% endblock %}
