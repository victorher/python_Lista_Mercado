{% extends "base.html" %}

{% block title %}Recuperar Contraseña - Mercado Inteligente{% endblock %}

{% block extra_css %}
<style>
    .login-container { max-width: 400px; margin: 40px auto; }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card shadow-sm border-0">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">Recuperar Contraseña</h3>
            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control" id="email" required autofocus placeholder="tu@email.com">
                    <div class="form-text">Te enviaremos un enlace para restablecer tu clave.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Enviar enlace</button>
            </form>
            <div class="mt-3 text-center">
                <a href="{{ url_for('mercado.login') }}" class="text-decoration-none small">Volver al inicio</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
